name: Pro OpenWrt Build Machine

on:
  workflow_dispatch:
    inputs:
      pkg_url:
        description: 'Add Package url'
        required: false
        default: ''
      pkg_name:
        description: 'package name (e.g. luci-theme-alpha)'
        required: true
        default: ''

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/lib/jvm
          sudo apt-get clean

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-setuptools \
            rsync unzip zlib1g-dev file wget zstd

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-24.10.5-ramips-mt7621

      - name: Download and Extract SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget https://immortalwrt.kyarucloud.moe/releases/24.10.5/targets/ramips/mt7621/immortalwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mkdir sdk
          tar -I zstd -xf *.tar.zst -C sdk --strip-components=1
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare Package and Find Actual Name
        run: |
          PKG_URL="${{ github.event.inputs.pkg_url }}"
          # تنظيف الاسم من أي مسارات أو رموز غريبة
          CLEAN_NAME=$(basename "${{ github.event.inputs.pkg_name }}")
          
          mkdir -p packages-src

          if [ -n "$PKG_URL" ]; then
            echo ">>> Mode: Clone new external package"
            # حذف أي نسخة قديمة عشان نحدثها بالجديدة
            rm -rf "packages-src/$CLEAN_NAME"
            git clone --depth 1 "$PKG_URL" "packages-src/$CLEAN_NAME"
            
            # تنظيف ملفات الجيت والوورك-فلووز عشان ميعملوش مشاكل في الريبو بتاعك
            find "packages-src/$CLEAN_NAME" -name ".git" -exec rm -rf {} +
            find "packages-src/$CLEAN_NAME" -name ".github" -exec rm -rf {} +
            find "packages-src/$CLEAN_NAME" -name ".gitignore" -exec rm -rf {} +
            
            cp -r "packages-src/$CLEAN_NAME" "sdk/package/"
          else
            if [ -d "packages-src/$CLEAN_NAME" ]; then
              echo ">>> Mode: Use modified package from packages-src"
              cp -r "packages-src/$CLEAN_NAME" "sdk/package/"
            else
              echo ">>> Mode: Use official feed package"
            fi
          fi

          echo ">>> Searching for actual package folder or symlink..."
          # البحث عن الفولدر الحقيقي جوه الـ SDK لإعطاء الاسم لـ make
          FOUND=$(find sdk/package -maxdepth 5 -name "*${CLEAN_NAME}*" | head -1)
          
          if [ -n "$FOUND" ]; then
            REAL_NAME=$(basename "$FOUND")
            echo "Found: $REAL_NAME"
            echo "REAL_PKG_NAME=$REAL_NAME" >> $GITHUB_ENV
          else
            echo "ERROR: Package '$CLEAN_NAME' not found."
            exit 1
          fi

      - name: Compile Package
        run: |
          cd sdk
          make defconfig
          make package/${{ env.REAL_PKG_NAME }}/compile -j$(nproc) V=s

      - name: Push Built Packages and Source to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # سحب التعديلات قبل الرفع لضمان عدم وجود Conflict
          git pull --rebase origin main

          # تجهيز فولدر النتائج
          mkdir -p files
          cp -r sdk/bin/. files/

          # إضافة التغييرات
          git add files/
          git add packages-src/

          # التحقق إذا كان هناك جديد لرفعه
          if git diff --cached --quiet; then
            echo "Nothing new to commit"
            exit 0
          fi

          git commit -m "build(${{ env.REAL_PKG_NAME }}): update source and bin $(date '+%Y-%m-%d %H:%M UTC')"
          git push origin main
          
